#Font
font_size   13.0
font_family JetBrains Mono Nerd Font

#Cursor
cursor_shape      block
cursor_trail      1

#url
detect_urls yes
url_color   #00008b
url_style   curly

#Background
background_opacity 0.75


#Use fish shell
shell fish

#Don't ask for clonsing window
confirm_os_window_close 0

#maps
map ctrl+minus change_font_size all -1
map ctrl+plus  change_font_size all +1
map ctrl+0     change_font_size all 13

remember_window_size yes
